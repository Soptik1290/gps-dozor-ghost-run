services:
  # ── Backend: NestJS Mission Command ──
  - type: web
    name: gps-dozor-server
    runtime: docker
    dockerContext: .
    dockerfilePath: server/Dockerfile
    plan: free # or starter
    region: frankfurt
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GPS_DOZOR_USERNAME
        sync: false
      - key: GPS_DOZOR_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PORT
        value: 3000

  # ── Frontend: Tactical HUD ──
  - type: web
    name: gps-dozor-client
    runtime: docker
    dockerContext: .
    dockerfilePath: client/Dockerfile
    plan: free
    region: frankfurt
    envVars:
      - key: VITE_API_URL
        fromService:
          name: gps-dozor-server
          type: web
          property: host
      - key: VITE_MAPBOX_TOKEN
        sync: false
