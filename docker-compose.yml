version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - GPS_DOZOR_USERNAME=${GPS_DOZOR_USERNAME}
      - GPS_DOZOR_PASSWORD=${GPS_DOZOR_PASSWORD}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: always

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - server
    restart: always
